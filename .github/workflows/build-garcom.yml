name: Build Android APK (Garçom App)

on:
  workflow_dispatch: # Permite rodar manualmente com um clique

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v3

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: ☕ Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Instalar dependências e Sincronizar Capacitor
        run: |
          npm install
          npx cap sync android

      - name: 🔨 Compilar o APK (Android Studio Cloud)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: 🚀 Disponibilizar o APK para Download
        uses: actions/upload-artifact@v3
        with:
          name: GarcomExpress-Nativo-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
