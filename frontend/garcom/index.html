<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarçomExpress - Garçom</title>
  <link rel="icon" type="image/svg+xml" href="/garcom/favicon.svg">
  <link rel="stylesheet" href="/garcom/style.css">
</head>
<body>
  <!-- Tela de Login -->
  <div id="tela-login" class="tela-login">
    <div class="login-box">
      <h1>GarçomExpress</h1>
      <p>Área do Colaborador</p>
      <input type="text" id="login-usuario" placeholder="Usuário">
      <input type="password" id="login-senha" placeholder="Senha">
      <button onclick="realizarLogin()">Entrar</button>
    </div>
  </div>

  <header>
    <div style="display:flex; justify-content: space-between; align-items: center; width: 100%;">
      <div>
        <h1>GarçomExpress</h1>
        <div style="display:flex; align-items:center; gap:8px;">
          <p id="garcom-nome-exibicao">Aguardando Login...</p>
          <span id="caixa-status-badge" class="badge-caixa" style="display:none;"></span>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <button id="btn-toggle-som" onclick="alternarSom()" style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;" title="Ativar/Desativar Som">🔔</button>
        <button onclick="logout()" style="width: auto; background: transparent; color: #fff; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3);">SAIR</button>
      </div>
    </div>
  </header>

  <main>
    <section id="mesas">
      <h2>Escolha uma Mesa</h2>
      <div id="mesas-grid"></div>
    </section>

    <section id="pedido" class="hidden">
      <h2>Pedido - Mesa <span id="mesa-atual"></span></h2>
      <div id="categorias"></div>
      <div id="menu-grid"></div>
      <div id="resumo-pedido">
        <h3>Resumo</h3>
        <div id="itens-pedido"></div>
        <p id="total-pedido">Total: R$ 0,00</p>
        <button id="enviar-pedido">Enviar Pedido</button>
        <button id="voltar-mesas">Voltar</button>
      </div>
    </section>
  </main>

  <!-- Modal de Opções da Mesa Ocupada -->
  <div id="modal-opcoes" class="modal-opcoes">
    <h2 id="modal-mesa-titulo">Mesa X</h2>
    
    <button class="btn-opcoes btn-ver-itens" onclick="verItensDaMesa()" style="background-color: #f1c40f; color: #2c3e50;">📋 Ver Itens Pedidos</button>
    <button class="btn-opcoes btn-adicionar" onclick="abrirCardapioAdicionar()">➕ Adicionar mais itens</button>
    <button class="btn-opcoes btn-fechar-conta" onclick="finalizarEDesocupar()">💰 Fechar Conta (Liberar)</button>
    <button class="btn-opcoes btn-cancelar" onclick="fecharOpcoes()">Voltar</button>
  </div>

  <!-- Modal de Visualização de Itens (Resumo da Mesa) -->
  <div id="modal-resumo-mesa" class="modal-opcoes" style="display:none;">
    <h2 id="resumo-mesa-titulo">Itens da Mesa</h2>
    <div id="lista-itens-mesa" style="text-align: left; margin-bottom: 1.5rem;"></div>
    <div id="total-resumo-mesa" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem;">Total: R$ 0,00</div>
    <button class="btn-opcoes btn-cancelar" onclick="fecharResumoMesa()">Fechar</button>
  </div>

  <!-- Modal de Fechamento (Novo) -->
  <div id="modal-fechamento-garcom" class="modal" style="display:none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000;">
    <div class="modal-content" style="max-width: 90%; width: 350px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3);">
      <h2 style="margin-bottom: 15px; color: #2c3e50; text-align: center;">Fechar Conta</h2>
      
      <div style="background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e9ecef;">
        <p style="margin: 0; font-size: 1.1rem; font-weight: bold; text-align: center; color: #27ae60;">Total: <span id="total-fechamento-garcom">R$ 0,00</span></p>
      </div>

      <div style="margin-bottom: 15px;">
        <label style="display:block; font-size:0.8rem; font-weight:bold; color:#7f8c8d; margin-bottom:5px;">FORMA DE PAGAMENTO:</label>
        <select id="forma-pagamento-garcom" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; font-size:1rem; background: #fff;" onchange="alternarCampoTroco()">
          <option value="Dinheiro">💵 Dinheiro</option>
          <option value="Pix">📱 Pix</option>
          <option value="Cartão">💳 Cartão</option>
        </select>
      </div>

      <div id="campo-recebido-garcom" style="margin-bottom: 15px;">
        <label style="display:block; font-size:0.8rem; font-weight:bold; color:#7f8c8d; margin-bottom:5px;">VALOR QUE O CLIENTE VAI DAR (R$):</label>
        <input type="number" id="valor-recebido-garcom" placeholder="0.00" step="0.50" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; font-size:1.1rem; font-weight:bold; color:#27ae60;" oninput="calcularTrocoGarcom()">
        <p style="margin: 8px 0 0 0; color: #e67e22; font-weight:bold; font-size: 0.9rem;">Troco: <span id="troco-garcom">R$ 0,00</span></p>
      </div>

      <div style="margin-bottom: 15px; padding: 10px; background: #fff9db; border-radius: 8px; border: 1px solid #fab1a0;">
        <label style="display:block; font-size:0.8rem; font-weight:bold; color:#e67e22; margin-bottom:5px;">DIVIDIR CONTA POR:</label>
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="number" id="divisao-pessoas-garcom" value="1" min="1" style="width:70px; padding:8px; border-radius:5px; border:1px solid #ddd; text-align:center;" oninput="calcularTrocoGarcom()">
          <span style="font-weight:bold; color:#e67e22; font-size:0.9rem;">Pessoas</span>
        </div>
        <p style="margin: 8px 0 0 0; color: #d35400; font-weight:bold; font-size: 0.9rem;">Cada um paga: <span id="valor-pessoa-garcom">R$ 0,00</span></p>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button onclick="cancelarFechamentoGarcom()" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-weight: bold; color: #7f8c8d;">VOLTAR</button>
        <button onclick="confirmarSolicitacaoFechamento()" style="flex: 1.5; padding: 12px; border-radius: 8px; border: none; background: #27ae60; color: #fff; font-weight: bold; font-size: 1rem;">SOLICITAR</button>
      </div>
    </div>
  </div>

  <!-- Modal de Sistema (Alert/Confirm) -->
  <div id="modal-sistema" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center; padding: 2rem;">
      <h2 id="modal-sistema-titulo" style="margin-bottom: 1rem; color: #2c3e50;">Aviso</h2>
      <p id="modal-sistema-mensagem" style="margin-bottom: 2rem; color: #7f8c8d; font-size: 1.1rem; line-height: 1.4;"></p>
      
      <div id="modal-sistema-acoes" style="display: flex; gap: 1rem; justify-content: center;">
        <button id="btn-sistema-cancelar" style="background: #7f8c8d; padding: 0.8rem 1.5rem; border-radius: 8px; flex: 1;" class="hidden">Cancelar</button>
        <button id="btn-sistema-confirmar" style="background: #27ae60; padding: 0.8rem 1.5rem; border-radius: 8px; flex: 1;">OK</button>
      </div>
    </div>
  </div>

  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <script src="/garcom/app.js?v=1.0.1"></script>
</body>
</html>
