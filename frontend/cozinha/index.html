<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarçomExpress - Cozinha</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <h1>👨‍🍳 Painel da Cozinha</h1>
                <div class="toggle-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);">
                    <span id="label-som" style="color: white; font-size: 0.9rem; font-weight: bold;">SOM</span>
                    <label class="switch">
                        <input type="checkbox" id="check-som" onchange="alternarSom()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div id="status-conexao" class="status-badge">Conectando...</div>
        </div>
    </header>

    <main id="pedidos-container">
        <!-- Os pedidos serão inseridos aqui dinamicamente -->
        <div class="loading">Carregando pedidos...</div>
    </main>

    <!-- Modal de Alerta de Cancelamento -->
    <div id="modal-cancelamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h2>PEDIDO CANCELADO!</h2>
            </div>
            <div id="modal-mensagem" class="modal-body">
                O pedido #X da Mesa Y foi cancelado pelo administrador.
            </div>
            <div class="modal-footer">
                <button onclick="fecharModalCancelamento()" class="btn-fechar-modal">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
