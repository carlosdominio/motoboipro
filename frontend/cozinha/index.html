<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarçomExpress - Cozinha</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <h1>👨‍🍳 Painel da Cozinha</h1>
                <button id="btn-toggle-som" onclick="alternarSom()" style="width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem;" title="Ativar/Desativar Som">🔔</button>
            </div>
            <div id="status-conexao" class="status-badge">Conectando...</div>
        </div>
    </header>

    <main id="pedidos-container">
        <!-- Os pedidos serão inseridos aqui dinamicamente -->
        <div class="loading">Carregando pedidos...</div>
    </main>

    <!-- Modal de Alerta de Cancelamento -->
    <div id="modal-cancelamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h2>PEDIDO CANCELADO!</h2>
            </div>
            <div id="modal-mensagem" class="modal-body">
                O pedido #X da Mesa Y foi cancelado pelo administrador.
            </div>
            <div class="modal-footer">
                <button onclick="fecharModalCancelamento()" class="btn-fechar-modal">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <audio id="audio-notificacao" 
    src="https://assets.mixkit.co/active_storage/sfx/594/594-preview.mp3"></audio>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
