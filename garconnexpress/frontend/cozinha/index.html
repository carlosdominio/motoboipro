<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarçomExpress - Cozinha</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="main-header">
        <div class="header-content">
            <h1>👨‍🍳 Painel da Cozinha</h1>
            <div class="header-controls">
                <div class="toggle-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);">
                    <span id="label-som" style="color: white; font-size: 0.9rem; font-weight: bold;">SOM</span>
                    <label class="switch">
                        <input type="checkbox" id="check-som" onchange="alternarSom()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="status-conexao" class="status-badge">Conectando...</div>
            </div>
        </div>
    </header>

    <!-- Tela de Caixa Fechado (Full Screen) -->
    <div id="closed-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1f2f6; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <div style="background: white; padding: 50px 30px; border-radius: 30px; box-shadow: 0 15px 45px rgba(0,0,0,0.15); max-width: 500px; width: 100%;">
            <div style="font-size: 6rem; margin-bottom: 25px;">😴</div>
            <h1 style="color: #2c3e50; margin-bottom: 15px; font-size: 2rem; font-weight: 800;">Cozinha em Pausa</h1>
            <p style="font-size: 1.2rem; color: #7f8c8d; line-height: 1.6; margin-bottom: 30px;">O caixa está fechado no momento. A cozinha não processará novos pedidos até que o sistema seja aberto.</p>
            <div style="display: inline-block; padding: 10px 25px; background: #e74c3c; color: white; border-radius: 50px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px;">MODO STANDBY ATIVO</div>
        </div>
    </div>

    <main id="pedidos-container">
        <!-- Os pedidos serão inseridos aqui dinamicamente -->
        <div class="loading">Carregando pedidos...</div>
    </main>

    <!-- Modal de Alerta de Cancelamento -->
    <div id="modal-cancelamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h2>PEDIDO CANCELADO!</h2>
            </div>
            <div id="modal-mensagem" class="modal-body">
                O pedido #X da Mesa Y foi cancelado pelo administrador.
            </div>
            <div class="modal-footer">
                <button onclick="fecharModalCancelamento()" class="btn-fechar-modal">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="app.js?v=1.0.5"></script>
</body>
</html>
